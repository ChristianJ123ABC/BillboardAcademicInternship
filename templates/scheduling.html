    <!-- Custom CSS -->

</head>

<body>

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="{{ url_for('dashboard') }}">

            Digital Billboard

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('dashboard') }}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="{{ url_for('scheduling') }}">
                        Scheduling
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('analytics') }}">
                        Analytics
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('uploadAdvertisement') }}">

                    </a>
                </li>

                                <!-- SUBSCRIPTION -->

                <li class="nav-item">

                    <a class="nav-link active"
                       href="{{ url_for('subscription') }}">

                        Subscription

                    </a>

                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger"
                       href="{{ url_for('logout') }}">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- PAGE CONTENT -->

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Campaign Scheduling
        </h1>

        <p class="text-muted">
            Schedule your advertisement campaigns
        </p>

    </div>

    <!-- SCHEDULING FORM -->

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <form>

                <!-- BILLBOARD LOCATION -->

                <div class="mb-3">

                    <label class="form-label">
                        Billboard Location
                    </label>

                    <select class="form-select">

                        <option>Dublin City Center</option>
                        <option>Airport Road</option>
                        <option>Shopping Mall</option>
                        <option>Train Station</option>

                    </select>

                </div>

                <!-- DATE -->

                <div class="mb-3">

                    <label class="form-label">
                        Campaign Date
                    </label>

                    <input type="date"
                           class="form-control">

                </div>

                <!-- TIME SLOT -->

                <div class="mb-3">

                    <label class="form-label">
                        Time Slot
                    </label>

                    <select class="form-select">

                        <option>08:00 AM - 12:00 PM</option>
                        <option>12:00 PM - 04:00 PM</option>
                        <option>04:00 PM - 08:00 PM</option>
                        <option>08:00 PM - 12:00 AM</option>

                    </select>

                </div>

                <!-- CAMPAIGN DURATION -->

                <div class="mb-3">

                    <label class="form-label">
                        Campaign Duration
                    </label>

                    <input type="number"
                           class="form-control"
                           placeholder="Enter number of days">

                </div>

                <!-- SUBMIT BUTTON -->

                <button type="submit"
                        class="btn btn-dark w-100">

                    Schedule Campaign

                </button>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

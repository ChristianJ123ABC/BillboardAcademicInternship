<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>

    <!-- Links for the bootstrap and CSS file-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

    <!-- Div Class for flash messages to appear on screen-->
    <div class = "flash">
        {% with messages = get_flashed_messages(with_categories = true)%}
        {% if messages%}
            {% for category, message in messages%}
            <div class = "{{ category }}"><h2>{{message}}</h2></div>
            {%endfor%}
            {%endif%}
            {%endwith%}
    </div>

    <!-- Uses POST to get the user's details, create a new account, and place it into the Users table in the database-->
    <div class = "register">
        <h1>Create a Business Account</h1>
        <form method = "POST" action="{{ url_for('register') }}">
            <input type = "text" name = "businessName" placeholder = "Business Name" value = "{{ request.form['businessName'] }}">
            <input type = "text" name = "firstName" placeholder = "First Name" value = "{{ request.form['firstName'] }}">
            <input type = "text" name = "lastName" placeholder = "Last Name" value = "{{ request.form['lastName'] }}">
            <input type = "email" name = "email" placeholder = "Email Address" value = "{{ request.form['email'] }}">
            <input type = "password" name = "password" placeholder = "password">
            <button type = "submit">Register</button>
        </form>
        Already have a registered business account? <a href="{{ url_for('login') }}">Login</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<!-- END: Code created by Christian-->

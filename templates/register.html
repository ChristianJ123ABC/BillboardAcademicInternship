<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/styles.css">

<style>
/* Full page reset */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* ===== Animated Background Image ===== */
.bg-animation {
    position: fixed;
    width: 100%;
    height: 100%;
    background:url("/static/uploads/train_station.jpg") center center/cover no-repeat;
    animation: zoomMove 20s infinite alternate ease-in-out;
    z-index: -3;
}

/* Zoom + slow movement effect */
@keyframes zoomMove {
    0% {
        transform: scale(1) translate(0px, 0px);
        filter: brightness(0.9);
    }
    100% {
        transform: scale(1.1) translate(-20px, -10px);
        filter: brightness(1.1);
    }
}

/* Dark overlay for readability */
.bg-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: -2;
}

/* Center container */
.center-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glassmorphism card (modern UI look) */
.glass-card {
    width: 420px;
    padding: 30px;
    border-radius: 16px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;

    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
}

/* Inputs styling */
.glass-card input {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
}

.glass-card input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

/* Button */
.glass-card .btn-primary {
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
    border: none;
}

.glass-card .btn-primary:hover {
    opacity: 0.9;
}    
</style>    
</head>

<body>

<!-- Animated background layer -->
<div class="bg-animation"></div>

<!-- Dark overlay for readability -->
<div class="bg-overlay"></div>

<!-- Flash messages -->
<div class="container mt-3 position-absolute w-100">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<!-- Center form -->
<div class="center-wrapper">

    <div class="glass-card">

        <h2 class="text-center mb-2">Create Business Account</h2>
        <p class="text-center text-muted mb-4">Join and grow your business</p>

        <form method="POST" action="{{ url_for('register') }}">

            <input type="text" name="businessName" placeholder="Business Name" class="form-control mb-3"
                value="{{ request.form.get('businessName','') }}">

            <div class="row">
                <div class="col">
                    <input type="text" name="firstName" placeholder="First Name" class="form-control mb-3"
                        value="{{ request.form.get('firstName','') }}">
                </div>
                <div class="col">
                    <input type="text" name="lastName" placeholder="Last Name" class="form-control mb-3"
                        value="{{ request.form.get('lastName','') }}">
                </div>
            </div>

            <input type="email" name="email" placeholder="Email" class="form-control mb-3"
                value="{{ request.form.get('email','') }}">

            <input type="password" name="password" placeholder="Password" class="form-control mb-3">

            <button class="btn btn-primary w-100">Register</button>

        </form>

        <hr>

        <p class="text-center">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

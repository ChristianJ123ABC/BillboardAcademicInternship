<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertisement Page</title>

    <!-- Links for the bootstrap and CSS file-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Log Out</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
    <!-- Div Class for flash messages to appear on screen-->
    <div class = "flash">
        {% with messages = get_flashed_messages(with_categories = true)%}
        {% if messages%}
            {% for category, message in messages%}
            <div class = "{{ category }}"><h2>{{message}}</h2></div>
            {%endfor%}
            {%endif%}
            {%endwith%}
    </div>

    <h1>Upload advertisements here!</h1>
    
    <!-- Form field used to upload the users advertisements to display-->
    <form id = "upload" action="/uploadAdvertisement" method="POST" class = "upload" enctype="multipart/form-data"> 
        <h3>Advertisement Submission</h3>
        <input type = "text" name = "caption" placeholder = "Enter caption">
        <input type = "file" name = "file"  placeholder = "Add advertisement">
        <button type = "submit">Upload Promotion</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<!-- END: Code created by Christian-->

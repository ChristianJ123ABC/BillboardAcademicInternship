<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Links for the bootstrap and CSS file-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- Div Class for flash messages to appear on screen-->
    <div class = "flash">
        {% with messages = get_flashed_messages(with_categories = true)%}
        {% if messages%}
            {% for category, message in messages%}
            <div class = "{{ category }}"><h2>{{message}}</h2></div>
            {%endfor%}
            {%endif%}
            {%endwith%}
    </div>

    <!-- Uses POST to check the user's login, and compare it to the database-->
    <div class = "login">
        <h1>Log in to your business account</h1>
        <form method = "POST" action="{{ url_for('login') }}">
            <input type = "email" name = "email" placeholder = "Email">
            <input type = "password" name = "password" placeholder = "Password">
            <button type = "submit">Login</button>
        </form>
        
        Haven't created a business account yet? <a href="{{ url_for('register') }}">Register</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<!-- END: Code created by Christian-->
